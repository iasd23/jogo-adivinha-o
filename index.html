<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo de Adivinhação de Números</title>
  <style>
    /* CSS - Estilos do Jogo */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 300px;
    }

    input {
      padding: 10px;
      width: 60%;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    p {
      font-size: 1.2em;
    }

    #mensagem {
      font-size: 1.1em;
      margin-top: 10px;
    }

    #tentativas {
      font-size: 1.2em;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Jogo de Adivinhação de Números</h1>
    <p>Eu estou pensando em um número entre 1 e 100.</p>
    <p>Qual é o seu palpite?</p>

    <input type="number" id="palpite" placeholder="Digite seu palpite" />
    <button id="enviar">Enviar Palpite</button>

    <p id="mensagem"></p>
    <p id="tentativas">Tentativas: 0</p>
  </div>

  <script>
    // JavaScript - Lógica do Jogo
    let numeroSecreto = Math.floor(Math.random() * 100) + 1;  // Gera o número secreto aleatório entre 1 e 100
    let tentativas = 0;

    document.getElementById('enviar').addEventListener('click', function() {
      let palpite = parseInt(document.getElementById('palpite').value);
      let mensagem = document.getElementById('mensagem');
      let tentativasDisplay = document.getElementById('tentativas');

      if (isNaN(palpite) || palpite < 1 || palpite > 100) {
        mensagem.textContent = "Por favor, insira um número válido entre 1 e 100.";
        return;
      }

      tentativas++;  // Aumenta o número de tentativas

      if (palpite < numeroSecreto) {
        mensagem.textContent = "Tente um número maior!";
      } else if (palpite > numeroSecreto) {
        mensagem.textContent = "Tente um número menor!";
      } else {
        mensagem.textContent = `Parabéns! Você acertou o número ${numeroSecreto} em ${tentativas} tentativas.`;
        numeroSecreto = Math.floor(Math.random() * 100) + 1;  // Gera um novo número secreto
        tentativas = 0;  // Reseta o número de tentativas
        tentativasDisplay.textContent = "Tentativas: 0";
        return;
      }

      tentativasDisplay.textContent = `Tentativas: ${tentativas}`;
    });
  </script>

</body>
</html>
